version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
      - /demo/payment-retry-template
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "*"
