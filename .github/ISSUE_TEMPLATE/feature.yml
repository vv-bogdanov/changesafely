name: Feature proposal
description: Propose a concrete SafeChange workflow improvement.
title: "proposal: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the developer workflow or safety gap, not only a solution.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and current workaround
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Minimum sufficient change
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Scope and safety impact
    validations:
      required: true
